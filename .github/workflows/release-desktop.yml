name: Release Desktop App

on:
  push:
    tags:
      - 'desktop-v*'   # 触发条件：推送 desktop-v0.2.0 这样的 tag

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          # 可按需加 Windows / Linux
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   args: --target x86_64-pc-windows-msvc
          # - os: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu
          #   args: --target x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install frontend dependencies
        working-directory: nanobot-desktop
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: nanobot-desktop/src-tauri -> target

      # macOS 需要安装证书（可选，用于 notarization）
      # - name: Import Apple certificate
      #   if: matrix.os == 'macos-latest'
      #   ...

      - name: Build Tauri app
        working-directory: nanobot-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set. Add it in repo Settings > Secrets to enable updater artifacts."
            exit 1
          fi
          pnpm tauri build ${{ matrix.args }}

      - name: List build output
        run: |
          echo "=== bundle/dmg ==="
          ls -la nanobot-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/ || true
          echo "=== bundle/macos ==="
          ls -la nanobot-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanobot-${{ matrix.target }}
          path: nanobot-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: error

  publish-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#desktop-v}" >> $GITHUB_OUTPUT

      - name: Generate latest.json (updater manifest)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # 收集各平台签名（bundle 目录含 dmg/ 和 macos/ 子目录）
          SIG_AARCH64=$(cat artifacts/nanobot-aarch64-apple-darwin/macos/*.app.tar.gz.sig 2>/dev/null || echo "")
          SIG_X86=$(cat artifacts/nanobot-x86_64-apple-darwin/macos/*.app.tar.gz.sig 2>/dev/null || echo "")

          cat > latest.json <<EOF
          {
            "version": "v${VERSION}",
            "notes": "See https://github.com/shileima/nanobot/releases/tag/desktop-v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/shileima/nanobot/releases/download/desktop-v${VERSION}/nanobot_${VERSION}_aarch64.app.tar.gz",
                "signature": "${SIG_AARCH64}"
              },
              "darwin-x86_64": {
                "url": "https://github.com/shileima/nanobot/releases/download/desktop-v${VERSION}/nanobot_${VERSION}_x86_64.app.tar.gz",
                "signature": "${SIG_X86}"
              }
            }
          }
          EOF
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "nanobot Desktop v${{ steps.version.outputs.VERSION }}"
          body: |
            ## nanobot Desktop v${{ steps.version.outputs.VERSION }}

            ### 安装方式
            - 下载 `.dmg` 文件安装
            - 已安装旧版本会自动弹出更新提示

            ### 更新日志
            详见 [CHANGELOG](https://github.com/shileima/nanobot/blob/main/CHANGELOG.md)
          files: |
            artifacts/nanobot-aarch64-apple-darwin/dmg/*.dmg
            artifacts/nanobot-aarch64-apple-darwin/macos/*.app.tar.gz
            artifacts/nanobot-aarch64-apple-darwin/macos/*.app.tar.gz.sig
            artifacts/nanobot-x86_64-apple-darwin/dmg/*.dmg
            artifacts/nanobot-x86_64-apple-darwin/macos/*.app.tar.gz
            artifacts/nanobot-x86_64-apple-darwin/macos/*.app.tar.gz.sig
            latest.json
          draft: false
          prerelease: false
