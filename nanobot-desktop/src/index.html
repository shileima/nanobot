<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="frame-src http://localhost:17798 http://127.0.0.1:17798;" />
    <title>🐈 nanobot</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div class="app-wrapper">
      <header class="app-header" data-tauri-drag-region>
        <span class="logo">🐈 nanobot <span id="appVersion" class="version-label"></span></span>
        <div class="header-actions">
          <button id="updateBtn" class="btn-icon" title="更新 nanobot">↻</button>
          <span id="statusBadge" class="status-badge">正在连接...</span>
        </div>
      </header>
      <div id="updateBanner" class="update-banner hidden">
        <span class="update-text">
          <span class="update-icon">✦</span>
          发现新版本 <strong id="updateVersion"></strong>
          <span class="update-current" id="updateCurrent"></span>
        </span>
        <div class="update-actions">
          <button id="doUpdateBtn" class="update-btn">立即更新</button>
          <button id="dismissUpdateBtn" class="update-dismiss" title="稍后提醒">✕</button>
        </div>
      </div>
      <main class="app-main">
        <iframe
          id="webchatFrame"
          src="http://localhost:17798"
          title="Web Chat"
        ></iframe>
      </main>
    </div>
  </body>
</html>
